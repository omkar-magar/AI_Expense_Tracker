name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential \
            git \
            zip \
            unzip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            automake \
            gettext \
            libltdl-dev \
            lld

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          # Pin to a known-good toolchain. The unpinned chain pulled a
          # bleeding-edge python-for-android that builds Python 3.14, whose
          # `android` glue module is broken (ImportError: cannot import name
          # mActivity → crash when the soft keyboard opens on a TextInput).
          # Cython must stay on 0.29.x; Cython 3.x breaks p4a recipes.
          pip install buildozer==1.5.0 python-for-android==2024.1.21 "cython==0.29.36"

      - name: Clone and patch python-for-android (register notification service)
        run: |
          set -e
          git clone --depth 1 --branch v2024.01.21 \
            https://github.com/kivy/python-for-android.git "$GITHUB_WORKSPACE/p4a-patched"
          python tools/patch_p4a_manifest.py "$GITHUB_WORKSPACE/p4a-patched"
          # Use the patched local p4a instead of cloning the pristine tag.
          sed -i "s|^p4a.branch = .*|p4a.source_dir = $GITHUB_WORKSPACE/p4a-patched|" buildozer.spec
          echo "--- p4a config now in buildozer.spec ---"
          grep -n "p4a\." buildozer.spec

      - name: Build APK
        run: |
          # Capture buildozer's real exit code via PIPESTATUS[0]; piping into
          # `tee` otherwise masks failure (tee returns 0 → job goes green even
          # when the build failed). stdin from /dev/null so no prompt can hang.
          buildozer android debug </dev/null 2>&1 | tee build.log
          status=${PIPESTATUS[0]}
          echo "=== BUILD EXIT CODE: $status ==="
          echo "=== Searching for APK ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== Last 120 lines of log ==="
          tail -120 build.log
          exit $status

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: AI-Expense-Tracker-APK
          path: |
            bin/*.apk
            .buildozer/android/platform/build-*/dists/*/build/outputs/apk/**/*.apk
          if-no-files-found: warn

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
